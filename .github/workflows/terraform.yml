name: "Terraform Deploy"

on:
  push:
    branches: [ "main" ]

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform 

    env:
      # Auth
      GOOGLE_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

      # Secrets
      TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      
      TF_VAR_region: "europe-central2"
      TF_VAR_zone: "europe-central2-a"

      # Resources
      TF_VAR_vm_name: "savitskyi-node"
      TF_VAR_vpc_name: "savitskyi-vpc"
      TF_VAR_subnet_name: "savitskyi-subnet"
      TF_VAR_firewall_name: "savitskyi-firewall"
      TF_VAR_bucket_name: "savitskyi-bucket"

      # Network
      TF_VAR_subnet_cidr: "10.10.10.0/24"

      # VM
      TF_VAR_machine_type: "e2-medium" 
      TF_VAR_disk_size: "20"
      TF_VAR_image: "ubuntu-os-cloud/ubuntu-2404-lts-amd64"

      # Bucket state
      TF_VAR_state_bucket: "terraform-state-lab3-dev"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      #Testing infrastructure before applying changes
      - name: Terraform Plan
        run: terraform plan -input=false

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false

      - name: Get Instance IP
        id: get_ip
        run: |
          VM_IP=$(terraform output -raw vm_ip)
          echo "VM_IP=$VM_IP" >> $GITHUB_ENV

      - name: Save IP Address
        run: echo "$(terraform output -raw vm_ip)" > vm_ip.txt

      - name: Upload IP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-ip
          path: terraform/vm_ip.txt